<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Checker | Arpan Christian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
  </head>
  <body class="password-checker-page">
    <nav id="navbar" class="scrolled">
      <div class="nav-container">
        <a href="/" class="logo">AC</a>
        <a href="/#projects" class="btn btn-outline btn-sm">
          <i class="fas fa-arrow-left"></i> Back to Projects
        </a>
      </div>
    </nav>

    <main class="password-checker-main">
      <div class="password-checker-card">
        <p class="hero-greeting">Security Utility</p>
        <h1 class="hero-name password-page-title">Password Strength Checker</h1>
        <p class="password-page-subtitle">
          Enter a username and password to instantly evaluate password strength.
        </p>

        <div class="password-form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. arpan" />
        </div>

        <div class="password-form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Type a password to check strength"
          />
        </div>

        <div class="password-strength-row">
          <span class="password-strength-label">Strength:</span>
          <span id="strength" class="password-strength-value"></span>
        </div>
      </div>
    </main>

    <script src="projects/pswdchecker/pswdchecker.js" defer></script>
  </body>
</html>
